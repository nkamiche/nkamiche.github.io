<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/favicon.ico">

    <title>Neha Kamichetty's Nice Kangaroo | ITIS3135 | Survey</title>

    <link rel="stylesheet" href="styles/default.css">

    <!-- survey-photo, theme-tagline, and survey-form use CSS classes in default.css; no inline style attributes -->
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous" type="text/plain" data-deferred-accumulus></script>
</head>

<body>
    <!-- data-include loads shared header and footer -->
    <div data-include="components/header.html"></div>

    <main>
        <h2>Survey</h2>

        <p class="theme-tagline">
            Help Kangaroo Adventure Outfitters improve your next outback experience.
        </p>

        <figure class="survey-photo">
            <img src="images/neha-introduction.jpg"
                 alt="Neha Kamichetty smiling in a restaurant mirror while holding a phone."
                 width="280">
            <figcaption>Neha Kamichetty — Kangaroo Adventure Outfitters survey page photo</figcaption>
        </figure>

        <form class="survey-form" action="#" method="post">
            <label for="customer-name">Name</label>
            <input type="text" id="customer-name" name="customer-name" required>

            <label for="customer-email">Email</label>
            <input type="email" id="customer-email" name="customer-email" required>

            <label for="favorite-product">Favorite Product</label>
            <select id="favorite-product" name="favorite-product" required>
                <option value="">Select a product</option>
                <option value="outback-trail-pack">Outback Trail Pack</option>
                <option value="joey-jump-training">Joey Jump Training Kit</option>
                <option value="sunset-roo-safari">Sunset Roo Safari Tour</option>
                <option value="pouch-pack-rental">Pouch Pack Rental</option>
                <option value="billabong-base-camp">Billabong Base Camp Pass</option>
            </select>

            <label for="visit-frequency">Visit Frequency</label>
            <select id="visit-frequency" name="visit-frequency" required>
                <option value="">How often do you visit?</option>
                <option value="first-time">First-time visitor</option>
                <option value="monthly">Once a month</option>
                <option value="quarterly">Every few months</option>
                <option value="yearly">Once a year</option>
            </select>

            <label for="comments">Comments</label>
            <textarea id="comments" name="comments" placeholder="Tell us about your kangaroo adventure..."></textarea>

            <div class="checkbox-row">
                <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                <label for="newsletter">Sign me up for the Kangaroo Adventure newsletter</label>
            </div>

            <div class="form-actions">
                <button type="submit">Submit Survey</button>
            </div>
        </form>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="scripts/htmlinclude.js"></script>

    <script src="https://divonbriesen.github.io/web123/scripts/standards-check.js" defer></script>

    <script>
        window.addEventListener("load", function () {
            setTimeout(function () {
                var placeholder = document.querySelector("script[data-deferred-accumulus]");
                if (!placeholder) {
                    return;
                }
                var accumulus = document.createElement("script");
                accumulus.src = placeholder.getAttribute("src");
                accumulus.crossOrigin = "anonymous";
                document.head.appendChild(accumulus);
            }, 2000);
        });
    </script>

</body>
</html>
